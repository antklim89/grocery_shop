#import "./ProductPreviewFragment.gql"
##import "./UserFragment.gql"


query OrderQuery($id: ID!) {
    order( id: $id ) {
        id
        uid
        status
        email
        name
        surname
        address
        phone
        carts {
            id
            qty
            product {
                ...ProductPreviewFragment
            }
        }
        user {
            id
            username
            email
        }
    }
}