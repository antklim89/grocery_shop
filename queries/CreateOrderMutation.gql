            
            
mutation CreateOrderMutation(
    $email: String!, 
    $name: String!, 
    $surname: String!, 
    $address: String!, 
    $phone: String!
    $carts: [ID!]!
) {
    createOrder(input: {
        data: {
            carts: $carts
            email: $email
            name: $name
            surname: $surname
            address: $address
            phone: $phone
        }
    }) {
        order {
            id
        }
    }
}