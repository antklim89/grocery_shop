#import "./ProductPreviewFragment.gql"


query productPageQuery(
        $country: String,
        $category: String,
        $sort: String = "id:desc"
        $offset: Int
        $search: String
    ) {
    products(
        where: {
            category: { name: $category }
            country: { name: $country }
            name_contains: $search
        }
        limit: 6
        start: $offset
        sort: $sort
    ) {
        ...ProductPreviewFragment
    }
    categories {
        name
        id
    }
    countries {
        name
        id
    }
}